<div class="card card-body p-4 m-5 sombra-roxa">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="text-roxo fw-bold mb-1">Atualizar Livro</h2>
            <p class="fs-5 mb-0">Edite as informações do livro selecionado:</p>
        </div>

        <a routerLink="/livros" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Voltar
        </a>
    </div>

    <hr>

    @if (form) {
    <form [formGroup]="form" (ngSubmit)="salvar()">
        <div class="row g-3">

            <div class="col-md-6">
                <div class="border rounded p-3 h-100 bg-light">
                    <label class="form-label text-muted">Id</label>
                    <input type="text" class="form-control" [value]="idLivro" readonly>
                </div>
            </div>

            <div class="col-md-6">
                <div class="border rounded p-3 h-100 bg-light">
                    <label class="form-label text-muted">Nome</label>
                    <input type="text" class="form-control" formControlName="nome">
                </div>
            </div>

            <div class="col-md-6">
                <div class="border rounded p-3 h-100 bg-light">
                    <label class="form-label text-muted">Editora</label>
                    <input type="text" class="form-control" formControlName="editora">
                </div>
            </div>

            <div class="col-md-6">
                <div class="border rounded p-3 h-100 bg-light">
                    <label class="form-label text-muted">Autor</label>
                    <input type="text" class="form-control" formControlName="autor">
                </div>
            </div>

            <div class="col-md-4">
                <div class="border rounded p-3 h-100 bg-light">
                    <label class="form-label text-muted">Quantidade</label>
                    <input type="number" class="form-control" formControlName="quantidade">
                </div>
            </div>

            <div class="col-md-4">
                <div class="border rounded p-3 h-100 bg-light">
                    <label class="form-label text-muted">Páginas</label>
                    <input type="number" class="form-control" formControlName="quantidadePaginas">
                </div>
            </div>

            <div class="col-md-4">
                <div class="border rounded p-3 h-100 bg-light">
                    <label class="form-label text-muted">Ano de edição</label>
                    <input type="number" class="form-control" formControlName="anoEdicao">
                </div>
            </div>

            <div class="col-md-6">
                <div class="border rounded p-3 h-100 bg-light">
                    <label class="form-label text-muted">Tipo do livro</label>
                    <select class="form-select" formControlName="tipoLivro">
                        <option [value]="1">Capa Mole</option>
                        <option [value]="2">Capa Dura</option>
                        <option [value]="3">Ebook</option>
                    </select>
                </div>
            </div>

            <div class="col-md-6">
                <div class="border rounded p-3 h-100 bg-light">
                    <label class="form-label text-muted">Gênero</label>
                    <select class="form-select" formControlName="generoLivro">
                        <option [value]="1">Ficção</option>
                        <option [value]="2">Fantasia</option>
                        <option [value]="3">Romance</option>
                        <option [value]="4">Terror</option>
                        <option [value]="5">HQ</option>
                        <option [value]="6">Autoajuda</option>
                        <option [value]="7">Religião</option>
                        <option [value]="8">Sociologia</option>
                        <option [value]="9">Filosofia</option>
                        <option [value]="10">Suspense</option>
                    </select>
                </div>
            </div>

            <div class="col-md-6">
                <div class="border rounded p-3 h-100 bg-light">
                    <label class="form-label text-muted">Status</label>
                    <input type="text" class="form-control" [value]="statusLivro[livro()?.status] || 'Não informado'"
                        readonly>
                </div>
            </div>

            <div class="col-md-6">
                <div class="border rounded p-3 h-100 bg-light">
                    <label class="form-label text-muted">Data de cadastro</label>
                    <input type="text" class="form-control" formControlName="dataHoraCadastro" readonly>
                </div>
            </div>

        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-outline-success">
                <i class="bi bi-floppy"></i> Salvar alterações
            </button>

            <a routerLink="/livros" class="btn btn-outline-danger">
                Cancelar
            </a>
        </div>
    </form>
    }

</div>
